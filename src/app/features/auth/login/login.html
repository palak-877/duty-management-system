<div class="login-container">

  <div class="login-box">

    <h2>Duty Management System</h2>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button (click)="login()">
      Login
    </button>

  </div>

</div>
