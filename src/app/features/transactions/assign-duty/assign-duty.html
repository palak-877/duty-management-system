<div class="assign-duty">

  <h2>Assign Duty</h2>

  <!-- Department Filter -->
  <div class="filters">

    <select [(ngModel)]="selectedDepartment">
      <option value="">All Departments</option>
      <option value="Education">Education</option>
      <option value="Health">Health</option>
      <option value="Revenue">Revenue</option>
    </select>

  </div>

  <!-- Employee Table -->
  <table>

    <tr>
      <th>Select</th>
      <th>Name</th>
      <th>Department</th>
      <th>Status</th>
    </tr>

    <tr *ngFor="let emp of filteredEmployees">

      <td>
        <input type="checkbox" [(ngModel)]="emp.selected" />
      </td>

      <td>{{ emp.name }}</td>
      <td>{{ emp.department }}</td>
      <td>{{ emp.status }}</td>

    </tr>

  </table>

  <button class="assign-btn" (click)="assignDuty()">
    Assign Duty
  </button>

</div>
