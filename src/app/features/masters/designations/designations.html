<div class="projects-container">

    <div class="page-header">

        <div>
            <h2>Duty Roles Management</h2>
            <p>Manage all duty roles used while assigning duties.</p>
        </div>

        <button
            class="add-btn"
            (click)="openModal()">

            + Add Duty Role

        </button>

    </div>

    <div class="search-box">

        <input
            type="text"
            placeholder="Search Duty Role..."
            [(ngModel)]="searchText">

    </div>

    <table>

        <thead>

            <tr>

                <th>Project</th>
                <th>Duty Role</th>
                <th>Description</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let designation of filteredDesignations()">

                <td>{{ getProjectName(designation.projectId) }}</td>

                <td>{{ designation.dutyRole }}</td>

                <td>{{ designation.description }}</td>

                <td>

                    <button
                        class="edit-btn"
                        (click)="editDesignation(designation)">

                        Edit

                    </button>

                    <button
                        class="delete-btn"
                        (click)="deleteDesignation(designation.id)">

                        Delete

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

    <div
        class="modal-backdrop"
        *ngIf="showModal">

        <div class="modal">

            <h2>

                {{ isEditMode ? 'Edit Duty Role' : 'Add New Duty Role' }}

            </h2>

            <label>Project</label>

            <select [(ngModel)]="selectedProject">

                <option value="">

                    Select Project

                </option>

                <option
                    *ngFor="let project of projects"
                    [value]="project.id">

                    {{ project.name }}

                </option>

            </select>

            <label>Duty Role</label>

            <input
                type="text"
                placeholder="Enter Duty Role"
                [(ngModel)]="dutyRole">

            <label>Description</label>

            <input
                type="text"
                placeholder="Enter Description"
                [(ngModel)]="description">

            <div class="buttons">

                <button
                    class="cancel-btn"
                    (click)="closeModal()">

                    Cancel

                </button>

                <button
                    class="save-btn"
                    (click)="saveDesignation()">

                    {{ isEditMode ? 'Update' : 'Save' }}

                </button>

            </div>

        </div>

    </div>

</div>
