<div class="projects-container">

    <div class="page-header">

        <div>
            <h2>Duty Roles Management</h2>
            <p>Manage all duty roles used while assigning duties.</p>
        </div>

        <button
            class="add-btn"
            (click)="openModal()">

            + Add Role

        </button>

    </div>

    <div class="search-box">

        <input
            type="text"
            placeholder="Search Role..."
            [(ngModel)]="searchText">

    </div>

    <table>

        <thead>

            <tr>

                <th>Role</th>
                <th>Description</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let designation of designations">

                <td>{{ designation.role }}</td>
                <td>{{ designation.description }}</td>

            </tr>

        </tbody>

    </table>

</div>
